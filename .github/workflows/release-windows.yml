name: Release Windows

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag (e.g., v0.2.3)"
        required: false
        type: string
      run_msstore:
        description: "Run Microsoft Store publish steps even if this is not a tag push"
        required: false
        type: boolean
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.2.3)"
        required: false
        type: string
      run_msstore:
        description: "Run Microsoft Store publish steps even if this is not a tag push"
        required: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: true

env:
  MS_IDENTITY_NAME: "DongdaLi.Mindwtr"
  MS_PUBLISHER_ID: "CN=76AC9B15-7A1B-49FF-9342-2BE80735A1E6"
  MS_PUBLISHER_DISPLAY_NAME: "Dongda Li"

jobs:
  standalone:
    runs-on: windows-2025-vs2026
    name: Windows Release
    timeout-minutes: 120
    env:
      VITE_DROPBOX_APP_KEY: ${{ vars.VITE_DROPBOX_APP_KEY || secrets.VITE_DROPBOX_APP_KEY }}
      VITE_FEEDBACK_ENDPOINT_URL: ${{ vars.VITE_FEEDBACK_ENDPOINT_URL || 'https://mindwtr-feedback.mindwtr.workers.dev' }}
      VITE_DONATION_PROMPT_ENABLED: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/desktop/src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: bun install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $env:GITHUB_EVENT_INPUTS_TAG = "${{ github.event.inputs.tag }}"
          $lines = & scripts/ci/resolve-release-version.ps1 -InputTag "${{ inputs.tag }}"
          foreach ($line in $lines) {
            $line >> $env:GITHUB_OUTPUT
          }
          $tag = (($lines | Where-Object { $_ -like 'tag=*' }) -replace '^tag=', '')
          $version = (($lines | Where-Object { $_ -like 'version=*' }) -replace '^version=', '')
          $msixVersion = ($version.Split('.') + @('0','0','0','0'))[0..3] -join '.'
          echo "msix_version=$msixVersion" >> $env:GITHUB_OUTPUT

      - name: Build Tauri app
        timeout-minutes: 30
        run: |
          cd apps/desktop
          cargo tauri build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_ANALYTICS_HEARTBEAT_URL: ${{ secrets.ANALYTICS_HEARTBEAT_URL }}
          VITE_ANALYTICS_RELEASE_VERSION: ${{ inputs.tag || github.event.inputs.tag || github.ref_name }}

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $buildDir = "apps/desktop/src-tauri/target/release"
          $portableDir = "portable-staging"
          $zipPath = "mindwtr_${{ steps.version.outputs.version }}_windows_x64_portable.zip"

          Remove-Item -Recurse -Force $portableDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path "$portableDir\profile\config" | Out-Null
          New-Item -ItemType Directory -Force -Path "$portableDir\profile\data" | Out-Null

          Copy-Item "$buildDir/mindwtr.exe" -Destination "$portableDir\mindwtr.exe"
          if (Test-Path "$buildDir/WebView2Loader.dll") {
            Copy-Item "$buildDir/WebView2Loader.dll" -Destination "$portableDir"
          }

          Set-Content -Path "$portableDir\portable.txt" -NoNewline -Value "Mindwtr portable mode marker. Keep this file next to mindwtr.exe."
          @(
            "Mindwtr Portable for Windows",
            "",
            "- Extract this ZIP to a writable folder.",
            "- Keep portable.txt next to mindwtr.exe.",
            "- Mindwtr stores local data under profile\data and profile\config beside the executable.",
            "- Portable mode keeps secrets in the local profile instead of Windows Credential Manager.",
            "- Windows WebView2 is still required."
          ) | Set-Content -Path "$portableDir\README-portable.txt"

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path "$portableDir\*" -DestinationPath $zipPath

      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts | Out-Null
          $releaseVersion = "${{ steps.version.outputs.version }}"
          $tauriConfig = Get-Content -Raw "apps/desktop/src-tauri/tauri.conf.json" | ConvertFrom-Json
          $baseVersion = [string]$tauriConfig.version

          function Resolve-ReleaseAssetName {
            param([Parameter(Mandatory = $true)][string]$Name)
            $target = $Name.ToLowerInvariant()
            $target = $target.Replace("_${baseVersion}_", "_${releaseVersion}_")
            $target = $target.Replace("-${baseVersion}-", "-${releaseVersion}-")
            return $target
          }

          Get-ChildItem "apps/desktop/src-tauri/target/release/bundle/nsis/*.exe" -ErrorAction SilentlyContinue | ForEach-Object {
            $target = Resolve-ReleaseAssetName -Name $_.Name
            Copy-Item $_.FullName "release-artifacts/$target"
          }
          Get-ChildItem "mindwtr_*_windows_x64_portable.zip" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName "release-artifacts/$($_.Name)"
          }
          Get-ChildItem release-artifacts

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: release-windows
          path: release-artifacts/*
          if-no-files-found: warn
          retention-days: 28

      - name: Ensure MakeAppx is available
        if: (startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')) || inputs.run_msstore
        shell: pwsh
        run: |
          $makeappx = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "makeappx.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "\\x64\\makeappx.exe$" } |
            Select-Object -First 1 -ExpandProperty FullName
          if ($makeappx) {
            Write-Host "Found makeappx at $makeappx"
            exit 0
          }
          if (Get-Command winget -ErrorAction SilentlyContinue) {
            winget install --id Microsoft.WindowsSDK.10.0.22621 --silent --accept-package-agreements --accept-source-agreements
            exit 0
          }
          Write-Error "makeappx.exe not found and winget is unavailable."

      - name: Create MSIX layout
        if: (startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')) || inputs.run_msstore
        shell: pwsh
        run: |
          $buildDir = "apps/desktop/src-tauri/target/release"
          $iconDir = "apps/desktop/src-tauri/icons"
          $outDir = "msix-staging"
          Remove-Item -Recurse -Force $outDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          New-Item -ItemType Directory -Force -Path "$outDir\Assets" | Out-Null
          Copy-Item "$buildDir/mindwtr.exe" -Destination "$outDir\mindwtr.exe"
          if (Test-Path "$buildDir/WebView2Loader.dll") {
            Copy-Item "$buildDir/WebView2Loader.dll" -Destination "$outDir"
          }
          Copy-Item "$iconDir/Square44x44Logo.png" "$outDir\Assets\StoreLogo.png"
          Copy-Item "$iconDir/Square150x150Logo.png" "$outDir\Assets\Square150x150Logo.png"
          Copy-Item "$iconDir/Square44x44Logo.png" "$outDir\Assets\Square44x44Logo.png"

      - name: Generate AppxManifest.xml
        if: (startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')) || inputs.run_msstore
        shell: pwsh
        run: |
          $manifest = @"
          <?xml version="1.0" encoding="utf-8"?>
          <Package xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10" 
                   xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10" 
                   xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities">
            <Identity Name="$env:MS_IDENTITY_NAME" 
                      Publisher="$env:MS_PUBLISHER_ID" 
                      Version="${{ steps.version.outputs.msix_version }}" />
            <Properties>
              <DisplayName>Mindwtr</DisplayName>
              <PublisherDisplayName>$env:MS_PUBLISHER_DISPLAY_NAME</PublisherDisplayName>
              <Logo>Assets\StoreLogo.png</Logo>
            </Properties>
            <Dependencies>
              <TargetDeviceFamily Name="Windows.Desktop" MinVersion="10.0.17763.0" MaxVersionTested="10.0.19041.0" />
            </Dependencies>
            <Resources>
              <Resource Language="en-us" />
            </Resources>
            <Applications>
              <Application Id="App" Executable="mindwtr.exe" EntryPoint="Windows.FullTrustApplication">
                <uap:VisualElements DisplayName="Mindwtr" 
                                    Description="Local-first GTD application" 
                                    BackgroundColor="transparent" 
                                    Square150x150Logo="Assets\Square150x150Logo.png" 
                                    Square44x44Logo="Assets\Square44x44Logo.png">
                </uap:VisualElements>
              </Application>
            </Applications>
            <Capabilities>
              <rescap:Capability Name="runFullTrust" />
            </Capabilities>
          </Package>
          "@
          $manifest | Out-File -FilePath "msix-staging\AppxManifest.xml" -Encoding UTF8

      - name: Build MSIX package
        if: (startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')) || inputs.run_msstore
        shell: pwsh
        run: |
          $msixPath = "mindwtr_${{ steps.version.outputs.version }}_x64.msix"
          $makeappx = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "makeappx.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "\\x64\\makeappx.exe$" } |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $makeappx) {
            throw "makeappx.exe not found for x64"
          }
          & $makeappx pack /d msix-staging /p $msixPath /o

      - name: Validate Microsoft Store secrets
        if: (startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')) || inputs.run_msstore
        shell: pwsh
        env:
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          MS_STORE_APP_ID: ${{ secrets.MS_STORE_APP_ID || '9N0V5B0B6FRX' }}
        run: |
          $required = @('MS_TENANT_ID','MS_CLIENT_ID','MS_CLIENT_SECRET','MS_STORE_APP_ID')
          foreach ($name in $required) {
            if (-not (Get-Item -Path "env:$name" -ErrorAction SilentlyContinue)) {
              Write-Error "$name is missing. Please set it in repository secrets."
            }
          }

      - name: Check Microsoft Store submission status
        if: (startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')) || inputs.run_msstore
        id: msstore_status
        shell: pwsh
        env:
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          MS_STORE_APP_ID: ${{ secrets.MS_STORE_APP_ID || '9N0V5B0B6FRX' }}
        run: |
          $tokenBody = @{
            grant_type    = 'client_credentials'
            resource      = 'https://manage.devcenter.microsoft.com'
            client_id     = $env:MS_CLIENT_ID
            client_secret = $env:MS_CLIENT_SECRET
          }
          try {
            $tokenResponse = Invoke-RestMethod -Method Post `
              -Uri "https://login.microsoftonline.com/$($env:MS_TENANT_ID)/oauth2/token" `
              -ContentType 'application/x-www-form-urlencoded' `
              -Body $tokenBody
          } catch {
            Write-Warning "Failed to obtain token for status check. Continuing: $_"
            "skip=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }
          $headers = @{ 'Authorization' = "Bearer $($tokenResponse.access_token)" }

          try {
            $appsResponse = Invoke-RestMethod -Method Get `
              -Uri 'https://manage.devcenter.microsoft.com/v1.0/my/applications' `
              -Headers $headers
          } catch {
            Write-Warning "Failed to list applications. Continuing: $_"
            "skip=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }

          $app = $appsResponse.value | Where-Object {
            $_.id -eq $env:MS_STORE_APP_ID -or
            ($_.applicationId -and $_.applicationId -eq $env:MS_STORE_APP_ID) -or
            ($_ | ConvertTo-Json -Depth 5 | Select-String -Pattern $env:MS_STORE_APP_ID -Quiet)
          } | Select-Object -First 1

          if (-not $app) {
            Write-Warning "Could not find app for status check. Continuing."
            "skip=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }

          $pendingSub = $null
          if ($app.PSObject.Properties.Name -contains 'pendingApplicationSubmission') {
            $pendingSub = $app.pendingApplicationSubmission
          }
          if ($pendingSub) {
            $pendingId = $pendingSub.id
            $applicationId = $app.id
            try {
              $statusResponse = Invoke-RestMethod -Method Get `
                -Uri "https://manage.devcenter.microsoft.com/v1.0/my/applications/$applicationId/submissions/$pendingId/status" `
                -Headers $headers
              $status = $statusResponse.status
              $blockedStatuses = @('CommitStarted', 'PreProcessing', 'Certification', 'Publishing', 'Release')
              if ($blockedStatuses -contains $status) {
                Write-Warning "Existing submission is in '$status' state. Skipping Store update."
                "skip=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
                exit 0
              }
            } catch {
              Write-Warning "Failed to check pending submission status: $_"
            }
          }
          "skip=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish to Microsoft Store (metadata + package)
        if: ((startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')) || inputs.run_msstore) && steps.msstore_status.outputs.skip != 'true' && env.MSSTORE_SKIP_PUBLISH != 'true'
        timeout-minutes: 40
        shell: pwsh
        env:
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          MS_STORE_APP_ID: ${{ secrets.MS_STORE_APP_ID || '9N0V5B0B6FRX' }}
          APP_VERSION: ${{ steps.version.outputs.version }}
          MSIX_VERSION: ${{ steps.version.outputs.msix_version }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $msixPath = (Resolve-Path "mindwtr_$($env:APP_VERSION)_x64.msix").Path
          $msixFileName = [System.IO.Path]::GetFileName($msixPath)
          $msixVersion = $env:MSIX_VERSION

          $isStoreBusy = {
            param([string]$text)
            if ([string]::IsNullOrWhiteSpace($text)) { return $false }
            return $text -match '(?i)(InvalidState|CommitStarted|PreProcessing|Certification|InCertification|PendingCommit|InProgress|Pending[\s_-]*Submission|Another\s+submission|already\s+.*submission)'
          }

          function Get-HttpStatusCodeFromError {
            param([System.Management.Automation.ErrorRecord]$ErrorRecord)
            try {
              $response = $ErrorRecord.Exception.Response
              if ($null -eq $response) { return $null }
              $statusCode = $response.StatusCode
              if ($null -eq $statusCode) { return $null }
              return [int]$statusCode
            } catch {
              return $null
            }
          }

          function Test-IsRetryableHttpFailure {
            param([System.Management.Automation.ErrorRecord]$ErrorRecord)
            $status = Get-HttpStatusCodeFromError -ErrorRecord $ErrorRecord
            if ($status -in @(408, 425, 429)) { return $true }
            if ($status -ge 500 -and $status -lt 600) { return $true }

            $message = [string]$ErrorRecord.Exception.Message
            if ($message -match '(?i)(gateway timeout|origin timeout|service unavailable|temporarily unavailable|timed out|azure front door)') {
              return $true
            }

            return $false
          }

          function Invoke-RestMethodWithRetry {
            param(
              [Parameter(Mandatory = $true)][ValidateSet('Get', 'Post', 'Put', 'Delete')] [string]$Method,
              [Parameter(Mandatory = $true)][string]$Uri,
              [hashtable]$Headers,
              [object]$Body,
              [string]$ContentType,
              [int]$MaxAttempts = 6
            )

            for ($attempt = 1; $attempt -le $MaxAttempts; $attempt++) {
              try {
                $invokeParams = @{
                  Method = $Method
                  Uri    = $Uri
                }
                if ($null -ne $Headers) {
                  $invokeParams.Headers = $Headers
                }
                if ($PSBoundParameters.ContainsKey('Body') -and $null -ne $Body) {
                  $invokeParams.Body = $Body
                }
                if ($PSBoundParameters.ContainsKey('ContentType') -and -not [string]::IsNullOrWhiteSpace($ContentType)) {
                  $invokeParams.ContentType = $ContentType
                }

                return Invoke-RestMethod @invokeParams
              } catch {
                $retryable = Test-IsRetryableHttpFailure -ErrorRecord $_
                if (-not $retryable -or $attempt -ge $MaxAttempts) {
                  throw
                }

                $delaySeconds = [Math]::Min(60, [int]([Math]::Pow(2, $attempt - 1) * 2))
                $status = Get-HttpStatusCodeFromError -ErrorRecord $_
                if ($null -ne $status) {
                  Write-Warning "HTTP $status from $Method $Uri (attempt $attempt/$MaxAttempts). Retrying in $delaySeconds seconds..."
                } else {
                  Write-Warning "Transient error from $Method $Uri (attempt $attempt/$MaxAttempts). Retrying in $delaySeconds seconds..."
                }
                Start-Sleep -Seconds $delaySeconds
              }
            }

            throw "Retry loop exhausted unexpectedly for $Method $Uri."
          }

          function Get-PartnerCenterApplication {
            $appsResponse = Invoke-RestMethodWithRetry -Method Get `
              -Uri 'https://manage.devcenter.microsoft.com/v1.0/my/applications' `
              -Headers $headers
            $matchedApp = $appsResponse.value | Where-Object {
              $_.id -eq $env:MS_STORE_APP_ID -or
              ($_.applicationId -and $_.applicationId -eq $env:MS_STORE_APP_ID) -or
              ($_ | ConvertTo-Json -Depth 5 | Select-String -Pattern $env:MS_STORE_APP_ID -Quiet)
            } | Select-Object -First 1
            if (-not $matchedApp) {
              Write-Host "Available apps:"
              $appsResponse.value | ForEach-Object { Write-Host "  ID=$($_.id)  primaryName=$($_.primaryName)" }
              throw "Could not find app matching MS_STORE_APP_ID='$($env:MS_STORE_APP_ID)'."
            }
            return $matchedApp
          }

          function Get-PendingSubmissionFromStore {
            param([string]$ApplicationId)
            $appSnapshot = Get-PartnerCenterApplication
            $pending = $null
            if ($appSnapshot.PSObject.Properties.Name -contains 'pendingApplicationSubmission') {
              $pending = $appSnapshot.pendingApplicationSubmission
            }
            if (-not $pending) {
              return $null
            }
            $pendingId = $pending.id
            Write-Warning "Found pending submission $pendingId after ambiguous create attempt. Reusing it."
            return Invoke-RestMethodWithRetry -Method Get `
              -Uri "https://manage.devcenter.microsoft.com/v1.0/my/applications/$ApplicationId/submissions/$pendingId" `
              -Headers $headers
          }

          $repoRoot = (Get-Location).Path
          $submissionUploadFiles = [System.Collections.Generic.Dictionary[string, string]]::new([System.StringComparer]::OrdinalIgnoreCase)
          $preferredDesktopStoreScreenshots = @(
            'capture.png',
            'focus.png',
            'kanban.png',
            'project.png',
            'review.png'
          )
          $preferredDesktopStoreBannerNames = @(
            'banner.png',
            'hero.png',
            'superhero.png',
            'super-hero.png'
          )

          function Convert-ToSubmissionRelativePath {
            param([string]$Path)
            $resolved = (Resolve-Path $Path).Path
            return [System.IO.Path]::GetRelativePath($repoRoot, $resolved).Replace('\', '/')
          }

          function Register-SubmissionUploadFile {
            param([string]$Path)
            $resolved = (Resolve-Path $Path).Path
            $relative = Convert-ToSubmissionRelativePath -Path $resolved
            if (-not $script:submissionUploadFiles.ContainsKey($relative)) {
              $script:submissionUploadFiles[$relative] = $resolved
            }
            return $relative
          }

          function Get-DesktopStoreListingAssets {
            $preferredDir = Join-Path $repoRoot 'apps/desktop/screenshots/msstore'
            $legacyDir = Join-Path $repoRoot 'apps/desktop/screenshots'
            $screenshotsDir = if (Test-Path $preferredDir) { $preferredDir } elseif (Test-Path $legacyDir) { $legacyDir } else { $null }
            if (-not $screenshotsDir) {
              return @{
                BaseDir = $preferredDir
                Screenshots = @()
                Banner = $null
              }
            }

            $available = @(Get-ChildItem -Path $screenshotsDir -File | Where-Object {
              $_.Extension.ToLowerInvariant() -in @('.png', '.jpg', '.jpeg')
            } | Sort-Object Name)
            if ($available.Count -eq 0) {
              return @{
                BaseDir = $screenshotsDir
                Screenshots = @()
                Banner = $null
              }
            }

            $byName = @{}
            foreach ($file in $available) {
              $byName[$file.Name.ToLowerInvariant()] = $file.FullName
            }

            $bannerPath = $null
            foreach ($name in $preferredDesktopStoreBannerNames) {
              if ($byName.ContainsKey($name)) {
                $bannerPath = $byName[$name]
                break
              }
            }

            $selected = [System.Collections.Generic.List[string]]::new()
            foreach ($name in $preferredDesktopStoreScreenshots) {
              if ($byName.ContainsKey($name)) {
                $candidate = $byName[$name]
                if ($bannerPath -and $candidate -eq $bannerPath) {
                  continue
                }
                $selected.Add($candidate)
              }
            }

            if ($selected.Count -eq 0) {
              foreach ($file in ($available | Where-Object { -not $bannerPath -or $_.FullName -ne $bannerPath } | Select-Object -First 8)) {
                $selected.Add($file.FullName)
              }
            }

            return @{
              BaseDir = $screenshotsDir
              Screenshots = $selected.ToArray()
              Banner = $bannerPath
            }
          }

          function Apply-RepoStoreListingAssets {
            param([object]$Metadata)
            if (-not $Metadata) { return }
            if (-not ($Metadata.PSObject.Properties.Name -contains 'Listings') -or -not $Metadata.Listings) {
              return
            }

            $listingAssets = Get-DesktopStoreListingAssets
            $screenshotsDir = $listingAssets.BaseDir
            $screenshotPaths = @($listingAssets.Screenshots)
            $bannerPath = $listingAssets.Banner
            $iconPath = Join-Path $repoRoot 'apps/desktop/src-tauri/icons/StoreLogo.png'
            if (-not (Test-Path $iconPath)) {
              $iconPath = $null
            }
            if ($screenshotPaths.Count -eq 0 -and -not $iconPath -and -not $bannerPath) {
              return
            }

            foreach ($listingProp in $Metadata.Listings.PSObject.Properties) {
              if (-not $listingProp.Value) { continue }
              if (-not ($listingProp.Value.PSObject.Properties.Name -contains 'BaseListing')) { continue }
              $baseListing = $listingProp.Value.BaseListing
              if (-not $baseListing) { continue }

              $images = [System.Collections.ArrayList]::new()
              foreach ($screenshotPath in $screenshotPaths) {
                [void]$images.Add([pscustomobject]@{
                  FileName   = (Register-SubmissionUploadFile -Path $screenshotPath)
                  FileStatus = 'PendingUpload'
                  ImageType  = 'Screenshot'
                })
              }
              if ($iconPath) {
                [void]$images.Add([pscustomobject]@{
                  FileName   = (Register-SubmissionUploadFile -Path $iconPath)
                  FileStatus = 'PendingUpload'
                  ImageType  = 'Icon'
                })
              }
              if ($bannerPath) {
                [void]$images.Add([pscustomobject]@{
                  FileName   = (Register-SubmissionUploadFile -Path $bannerPath)
                  FileStatus = 'PendingUpload'
                  ImageType  = 'PromotionalArt16x9'
                })
              }

              if ($images.Count -gt 0) {
                $baseListing.Images = $images.ToArray()
              }
            }

            $extraNotes = [System.Collections.Generic.List[string]]::new()
            if ($iconPath) {
              [void]$extraNotes.Add('the desktop Store logo')
            }
            if ($bannerPath) {
              [void]$extraNotes.Add('the 16:9 promotional hero art')
            }
            $suffix = if ($extraNotes.Count -gt 0) { " plus " + ($extraNotes -join ' and ') } else { '' }
            Write-Host "Using $($screenshotPaths.Count) screenshots from $screenshotsDir$suffix for Microsoft Store listings."
          }

          $tokenBody = @{
            grant_type    = 'client_credentials'
            resource      = 'https://manage.devcenter.microsoft.com'
            client_id     = $env:MS_CLIENT_ID
            client_secret = $env:MS_CLIENT_SECRET
          }
          Write-Host "Obtaining Partner Center access token..."
          $tokenResponse = Invoke-RestMethodWithRetry -Method Post `
            -Uri "https://login.microsoftonline.com/$($env:MS_TENANT_ID)/oauth2/token" `
            -ContentType 'application/x-www-form-urlencoded' `
            -Body $tokenBody
          $accessToken = $tokenResponse.access_token
          if (-not $accessToken) {
            throw "Failed to obtain Partner Center access token."
          }
          $headers = @{
            'Authorization' = "Bearer $accessToken"
            'Content-Type'  = 'application/json'
          }

          Write-Host "Looking up application..."
          $app = Get-PartnerCenterApplication
          $applicationId = $app.id
          Write-Host "Found application: $($app.primaryName) (ID: $applicationId)"

          $pendingSub = $null
          if ($app.PSObject.Properties.Name -contains 'pendingApplicationSubmission') {
            $pendingSub = $app.pendingApplicationSubmission
          }
          if ($pendingSub) {
            $pendingId = $pendingSub.id
            Write-Host "Deleting existing pending submission $pendingId..."
            try {
              Invoke-RestMethodWithRetry -Method Delete `
                -Uri "https://manage.devcenter.microsoft.com/v1.0/my/applications/$applicationId/submissions/$pendingId" `
                -Headers $headers
              Write-Host "Deleted pending submission."
            } catch {
              $errText = $_.Exception.Message
              if ($errText -match '(?i)created through the API') {
                throw "Existing pending submission $pendingId was created or edited in Partner Center, so the submission API cannot delete or update it. Delete or publish that draft manually, then rerun this workflow. The workflow now sources listing assets from apps/desktop/screenshots/msstore (falling back to apps/desktop/screenshots) instead of a Partner Center draft."
              }
              if (& $isStoreBusy $errText) {
                Write-Warning "Existing submission is in certification; cannot delete. Skipping publish."
                exit 0
              }
              throw
            }
          }

          Write-Host "Creating new submission..."
          $submission = $null
          for ($createAttempt = 1; $createAttempt -le 3 -and -not $submission; $createAttempt++) {
            try {
              $submission = Invoke-RestMethodWithRetry -Method Post `
                -Uri "https://manage.devcenter.microsoft.com/v1.0/my/applications/$applicationId/submissions" `
                -Headers $headers `
                -MaxAttempts 1
            } catch {
              $errText = $_.Exception.Message
              $statusCode = Get-HttpStatusCodeFromError -ErrorRecord $_
              $retryable = Test-IsRetryableHttpFailure -ErrorRecord $_

              try {
                $submission = Get-PendingSubmissionFromStore -ApplicationId $applicationId
              } catch {
                Write-Warning "Failed to inspect pending submissions after create attempt ${createAttempt}: $($_.Exception.Message)"
              }

              if ($submission) {
                break
              }

              if (& $isStoreBusy $errText) {
                Write-Warning "Microsoft Store rejected new submission creation because another submission is still being processed. Skipping publish."
                exit 0
              }

              if ($retryable -and $createAttempt -lt 3) {
                $delaySeconds = [Math]::Min(60, [int]([Math]::Pow(2, $createAttempt - 1) * 5))
                if ($null -ne $statusCode) {
                  Write-Warning "Submission creation returned HTTP $statusCode on attempt $createAttempt/3. Retrying after checking store state in $delaySeconds seconds..."
                } else {
                  Write-Warning "Submission creation failed on attempt $createAttempt/3. Retrying after checking store state in $delaySeconds seconds..."
                }
                Start-Sleep -Seconds $delaySeconds
                continue
              }

              throw
            }
          }
          if (-not $submission) {
            throw "Failed to create or recover a Microsoft Store submission."
          }
          $submissionId = $submission.id
          $fileUploadUrl = $submission.fileUploadUrl
          Write-Host "Created submission $submissionId"

          $existingSameVersionPackage = $null
          if ($submission.applicationPackages) {
            $existingSameVersionPackage = $submission.applicationPackages | Where-Object {
              ($_.PSObject.Properties.Name -contains 'version' -and $_.version -eq $msixVersion) -or
              ($_.PSObject.Properties.Name -contains 'fileName' -and $_.fileName -eq $msixFileName)
            } | Select-Object -First 1
          }
          if ($existingSameVersionPackage) {
            $existingVersion = if ($existingSameVersionPackage.PSObject.Properties.Name -contains 'version') { $existingSameVersionPackage.version } else { '<unknown>' }
            $existingFileName = if ($existingSameVersionPackage.PSObject.Properties.Name -contains 'fileName') { $existingSameVersionPackage.fileName } else { '<unknown>' }
            Write-Warning "Microsoft Store already has package $existingFileName version $existingVersion. Deleting this draft submission and skipping publish for $msixFileName."
            try {
              Invoke-RestMethodWithRetry -Method Delete `
                -Uri "https://manage.devcenter.microsoft.com/v1.0/my/applications/$applicationId/submissions/$submissionId" `
                -Headers $headers
              Write-Host "Deleted duplicate-version draft submission $submissionId."
            } catch {
              Write-Warning "Failed to delete duplicate-version draft submission ${submissionId}: $($_.Exception.Message)"
            }
            exit 0
          }

          $packages = [System.Collections.ArrayList]::new()
          if ($submission.applicationPackages) {
            foreach ($pkg in $submission.applicationPackages) {
              $pkg.fileStatus = 'PendingDelete'
              [void]$packages.Add($pkg)
            }
          }
          [void]$packages.Add(@{
            fileName              = $msixFileName
            fileStatus            = 'PendingUpload'
            minimumDirectXVersion = 'None'
            minimumSystemRam      = 'None'
          })
          $submission.applicationPackages = $packages.ToArray()

          if (Test-Path "metadata/metadata.json") {
            Write-Host "Applying metadata from metadata/metadata.json..."
            $metadata = Get-Content -Raw "metadata/metadata.json" | ConvertFrom-Json

            function Normalize-StoreListingText {
              param([string]$Text)
              if ([string]::IsNullOrWhiteSpace($Text)) {
                return $Text
              }

              $normalized = $Text -replace "`r`n?", "`n"

              # Fix hard wraps that split short words (e.g., Lo\ncal-First) and CJK punctuation/characters.
              $normalized = [System.Text.RegularExpressions.Regex]::Replace(
                $normalized,
                '([A-Za-zÀ-ÖØ-öø-ÿ]{1,2})\n([a-zà-öø-ÿ])',
                '$1$2'
              )
              $normalized = [System.Text.RegularExpressions.Regex]::Replace(
                $normalized,
                '([\p{IsCJKUnifiedIdeographs}])\n([，。！？、；：）】》」』\p{IsCJKUnifiedIdeographs}])',
                '$1$2'
              )

              # Convert single line breaks to spaces, while preserving paragraph breaks and bullet lines.
              $normalized = [System.Text.RegularExpressions.Regex]::Replace(
                $normalized,
                '(?<!\n)\n(?!\n|[•*\-]|\d+[.)]\s)',
                ' '
              )

              $normalized = [System.Text.RegularExpressions.Regex]::Replace($normalized, ' {2,}', ' ')
              $normalized = [System.Text.RegularExpressions.Regex]::Replace($normalized, '\s+([,.;:!?])', '$1')
              $normalized = [System.Text.RegularExpressions.Regex]::Replace($normalized, '\s+([，。！？、；：）】》」』])', '$1')
              return $normalized.Trim()
            }

            if ($metadata.PSObject.Properties.Name -contains 'Listings' -and $metadata.Listings) {
              foreach ($listingProp in $metadata.Listings.PSObject.Properties) {
                if (-not $listingProp.Value) { continue }
                if (-not ($listingProp.Value.PSObject.Properties.Name -contains 'BaseListing')) { continue }
                $baseListing = $listingProp.Value.BaseListing
                if (-not $baseListing) { continue }
                if ($baseListing.PSObject.Properties.Name -contains 'Description') {
                  $baseListing.Description = Normalize-StoreListingText -Text ([string]$baseListing.Description)
                }
              }
            }

            Apply-RepoStoreListingAssets -Metadata $metadata

            $fieldMap = @{
              listings = 'Listings'
              applicationCategory = 'ApplicationCategory'
              pricing = 'Pricing'
              visibility = 'Visibility'
              targetPublishMode = 'TargetPublishMode'
              targetPublishDate = 'TargetPublishDate'
              hardwarePreferences = 'HardwarePreferences'
              hasExternalInAppProducts = 'HasExternalInAppProducts'
              meetAccessibilityGuidelines = 'MeetAccessibilityGuidelines'
              notesForCertification = 'NotesForCertification'
              allowMicrosoftDecideAppAvailabilityToFutureDeviceFamilies = 'AllowMicrosoftDecideAppAvailabilityToFutureDeviceFamilies'
              allowTargetFutureDeviceFamilies = 'AllowTargetFutureDeviceFamilies'
              automaticBackupEnabled = 'AutomaticBackupEnabled'
              canInstallOnRemovableMedia = 'CanInstallOnRemovableMedia'
              isGameDvrEnabled = 'IsGameDvrEnabled'
              enterpriseLicensing = 'EnterpriseLicensing'
            }
            foreach ($target in $fieldMap.Keys) {
              $source = $fieldMap[$target]
              if ($metadata.PSObject.Properties.Name -contains $source) {
                $submission.$target = $metadata.$source
              }
            }
          } else {
            Write-Warning "metadata/metadata.json not found; submitting cloned metadata from last published version."
          }

          foreach ($prop in @('id', 'status', 'statusDetails', 'fileUploadUrl', 'friendlyName', 'pendingApplicationId', 'sales')) {
            if ($submission.PSObject.Properties.Name -contains $prop) {
              $submission.PSObject.Properties.Remove($prop)
            }
          }
          $submissionJson = $submission | ConvertTo-Json -Depth 100 -Compress

          Write-Host "Updating submission data (metadata + package references)..."
          Invoke-RestMethodWithRetry -Method Put `
            -Uri "https://manage.devcenter.microsoft.com/v1.0/my/applications/$applicationId/submissions/$submissionId" `
            -Headers $headers `
            -Body ([System.Text.Encoding]::UTF8.GetBytes($submissionJson)) `
            -ContentType 'application/json; charset=utf-8'

          Write-Host "Creating ZIP archive for upload..."
          $zipPath = "$env:RUNNER_TEMP/submission-package.zip"
          $uploadRoot = Join-Path $env:RUNNER_TEMP 'submission-package'
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          if (Test-Path $uploadRoot) { Remove-Item -Recurse -Force $uploadRoot }
          New-Item -ItemType Directory -Force -Path $uploadRoot | Out-Null
          Copy-Item $msixPath (Join-Path $uploadRoot $msixFileName)
          foreach ($relativePath in ($submissionUploadFiles.Keys | Sort-Object)) {
            $sourcePath = $submissionUploadFiles[$relativePath]
            $destinationPath = Join-Path $uploadRoot ($relativePath -replace '/', [System.IO.Path]::DirectorySeparatorChar)
            $destinationDir = Split-Path -Parent $destinationPath
            if (-not (Test-Path $destinationDir)) {
              New-Item -ItemType Directory -Force -Path $destinationDir | Out-Null
            }
            Copy-Item $sourcePath $destinationPath -Force
          }
          Compress-Archive -Path (Join-Path $uploadRoot '*') -DestinationPath $zipPath -Force
          $zipBytes = [System.IO.File]::ReadAllBytes($zipPath)

          Write-Host "Uploading package payload..."
          Invoke-RestMethodWithRetry -Method Put `
            -Uri $fileUploadUrl `
            -Headers @{ 'x-ms-blob-type' = 'BlockBlob' } `
            -Body $zipBytes `
            -ContentType 'application/octet-stream'

          Write-Host "Committing submission..."
          Invoke-RestMethodWithRetry -Method Post `
            -Uri "https://manage.devcenter.microsoft.com/v1.0/my/applications/$applicationId/submissions/$submissionId/commit" `
            -Headers @{ 'Authorization' = "Bearer $accessToken"; 'Content-Type' = 'application/json' } `
            -Body '{}'

          Write-Host "Polling submission status..."
          $deadline = (Get-Date).AddMinutes(30)
          while ((Get-Date) -lt $deadline) {
            Start-Sleep -Seconds 30
            try {
              $statusResponse = Invoke-RestMethodWithRetry -Method Get `
                -Uri "https://manage.devcenter.microsoft.com/v1.0/my/applications/$applicationId/submissions/$submissionId/status" `
                -Headers @{ 'Authorization' = "Bearer $accessToken" } `
                -MaxAttempts 3
            } catch {
              $statusCode = Get-HttpStatusCodeFromError -ErrorRecord $_
              if ($statusCode -in @(401, 403)) {
                Write-Warning "Status poll unauthorized; refreshing token."
                $tokenResponse = Invoke-RestMethodWithRetry -Method Post `
                  -Uri "https://login.microsoftonline.com/$($env:MS_TENANT_ID)/oauth2/token" `
                  -ContentType 'application/x-www-form-urlencoded' `
                  -Body $tokenBody
                $accessToken = $tokenResponse.access_token
              } else {
                Write-Warning "Status poll failed: $($_.Exception.Message)"
              }
              continue
            }
            $currentStatus = $statusResponse.status
            Write-Host "  Status: $currentStatus"
            if ($currentStatus -eq 'CommitFailed') {
              $details = $statusResponse.statusDetails | ConvertTo-Json -Depth 5
              throw "Submission commit failed. Details: $details"
            }
            if ($currentStatus -in @('PreProcessing', 'Certification', 'Publishing', 'Published', 'Release')) {
              break
            }
          }
          Write-Host "Microsoft Store publish completed."
