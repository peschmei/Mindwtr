name: Update Flathub

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag to publish to Flathub (e.g. v0.7.5)'
        required: true
        type: string
      channel:
        description: 'Flathub channel to update: stable or beta'
        required: false
        default: 'stable'
        type: string
    secrets:
      FLATHUB_REPO_TOKEN:
        required: true
      VITE_DROPBOX_APP_KEY:
        required: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: update-flathub-${{ inputs.channel }}-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  open-flathub-pr:
    name: Open Flathub PR
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      VITE_DROPBOX_APP_KEY: ${{ vars.VITE_DROPBOX_APP_KEY || secrets.VITE_DROPBOX_APP_KEY }}
      VITE_FEEDBACK_ENDPOINT_URL: ${{ vars.VITE_FEEDBACK_ENDPOINT_URL || 'https://mindwtr-feedback.mindwtr.workers.dev' }}
      VITE_ANALYTICS_RELEASE_VERSION: ${{ inputs.tag }}

    steps:
      - name: Checkout Mindwtr
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          scripts/ci/resolve-release-version.sh "$INPUT_TAG" >> "$GITHUB_OUTPUT"

      - name: Classify release tag
        id: stability
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          CHANNEL="${{ inputs.channel }}"

          case "$CHANNEL" in
            stable)
              FLATHUB_BRANCH="master"
              ;;
            beta)
              FLATHUB_BRANCH="beta"
              ;;
            *)
              echo "Unsupported Flathub channel: ${CHANNEL}. Expected stable or beta." >&2
              exit 1
              ;;
          esac

          echo "flathub_branch=${FLATHUB_BRANCH}" >> "$GITHUB_OUTPUT"

          if [[ "$TAG" == *-* && "$CHANNEL" != "beta" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "message=Stable Flathub automation skips prerelease tags: $TAG" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "message=" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Flathub automation secrets
        if: steps.stability.outputs.skip != 'true'
        env:
          FLATHUB_REPO_TOKEN: ${{ secrets.FLATHUB_REPO_TOKEN }}
        run: |
          if [ -z "${FLATHUB_REPO_TOKEN:-}" ]; then
            echo "Missing FLATHUB_REPO_TOKEN secret." >&2
            exit 1
          fi

      - name: Verify Flathub branch exists
        if: steps.stability.outputs.skip != 'true'
        run: |
          set -euo pipefail
          BRANCH="${{ steps.stability.outputs.flathub_branch }}"
          REPO_URL="https://github.com/flathub/tech.dongdongbh.mindwtr.git"
          if ! git ls-remote --exit-code --heads "$REPO_URL" "$BRANCH" >/dev/null 2>&1; then
            echo "Missing Flathub branch ${BRANCH} in flathub/tech.dongdongbh.mindwtr. Create it before enabling ${BRANCH} RC publication." >&2
            exit 1
          fi

      - name: Checkout Flathub repo
        if: steps.stability.outputs.skip != 'true'
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: flathub/tech.dongdongbh.mindwtr
          ref: ${{ steps.stability.outputs.flathub_branch }}
          token: ${{ secrets.FLATHUB_REPO_TOKEN }}
          path: flathub

      - name: Verify Flathub target branch
        if: steps.stability.outputs.skip != 'true'
        run: |
          set -euo pipefail
          BRANCH="${{ steps.stability.outputs.flathub_branch }}"
          cd flathub
          if ! git rev-parse --verify HEAD >/dev/null 2>&1; then
            echo "Could not check out Flathub branch ${BRANCH}. Create the Flathub beta branch before enabling beta RC publication." >&2
            exit 1
          fi
          echo "Using Flathub branch ${BRANCH}."

      - name: Prepare Flathub branch
        id: branch
        if: steps.stability.outputs.skip != 'true'
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          CHANNEL="${{ inputs.channel }}"
          BRANCH="automation/update-${CHANNEL}-v${VERSION}"

          cd flathub

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git switch -C "$BRANCH" "origin/$BRANCH"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            git switch -c "$BRANCH"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Checkout flatpak-builder-tools
        if: steps.stability.outputs.skip != 'true'
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: flatpak/flatpak-builder-tools
          ref: 37eb3e5bdc5a14d13ee27b85265aae2c5e9a60c2
          path: flatpak-builder-tools

      - name: Install Flatpak generator dependencies
        if: steps.stability.outputs.skip != 'true'
        run: |
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user aiohttp tomlkit pipx
          python3 -m pipx install "$GITHUB_WORKSPACE/flatpak-builder-tools/node"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Update Flathub checkout
        if: steps.stability.outputs.skip != 'true'
        run: |
          scripts/ci/update-flathub-checkout.sh \
            "${{ steps.version.outputs.tag }}" \
            "$GITHUB_WORKSPACE/flathub" \
            "$GITHUB_WORKSPACE/flatpak-builder-tools"

      - name: Validate generated Flathub sources
        if: steps.stability.outputs.skip != 'true'
        run: |
          set -euo pipefail

          worktree_dir="$(mktemp -d)"

          cleanup() {
            git worktree remove --force "$worktree_dir" >/dev/null 2>&1 || true
            rm -rf "$worktree_dir"
          }

          trap cleanup EXIT

          git worktree add --force --detach "$worktree_dir" "${{ steps.version.outputs.tag }}" >/dev/null

          python3 scripts/ci/repair-package-lock.py \
            --check \
            "$worktree_dir/apps/desktop/package-lock.json"

          python3 - "$GITHUB_WORKSPACE/flathub/tech.dongdongbh.mindwtr.node-sources.json" "$worktree_dir/apps/desktop/package-lock.json" "$worktree_dir/packages/core/package-lock.json" <<'PY'
          import json
          import pathlib
          import sys

          node_sources_path = pathlib.Path(sys.argv[1])
          node_sources = json.loads(node_sources_path.read_text())

          source_urls = {
              entry["url"]
              for entry in node_sources
              if isinstance(entry, dict)
              and entry.get("type") in {"file", "archive"}
              and isinstance(entry.get("url"), str)
          }

          total_expected_urls = 0

          for lock_arg in sys.argv[2:]:
              lock_path = pathlib.Path(lock_arg)
              lock = json.loads(lock_path.read_text())
              expected_urls = {
                  meta["resolved"]
                  for package_path, meta in lock.get("packages", {}).items()
                  if isinstance(meta, dict)
                  and package_path.startswith("node_modules/")
                  and not meta.get("link")
                  and "version" in meta
                  and isinstance(meta.get("resolved"), str)
                  and meta["resolved"].startswith("https://registry.npmjs.org/")
              }

              missing_urls = sorted(expected_urls - source_urls)
              if missing_urls:
                  preview = "\n".join(f"  - {url}" for url in missing_urls[:20])
                  suffix = "" if len(missing_urls) <= 20 else f"\n  ... and {len(missing_urls) - 20} more"
                  raise SystemExit(
                      f"Generated Flathub node sources are missing {len(missing_urls)} npm tarball URLs required by {lock_path}:\n"
                      + preview
                      + suffix
                  )

              total_expected_urls += len(expected_urls)
              print(
                  f"Validated Flathub node sources coverage for {len(expected_urls)} npm tarball URLs in {lock_path}"
              )

          print(
              f"Validated Flathub node sources coverage across {len(sys.argv) - 2} lockfiles ({total_expected_urls} URLs before dedupe)"
          )
          PY

      - name: Create or update Flathub PR
        id: pr
        if: steps.stability.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.FLATHUB_REPO_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          BRANCH="${{ steps.branch.outputs.branch }}"
          REPO="flathub/tech.dongdongbh.mindwtr"

          cd flathub

          existing_pr_url="$(gh pr list \
            --repo "$REPO" \
            --head "$BRANCH" \
            --base "${{ steps.stability.outputs.flathub_branch }}" \
            --state open \
            --json url \
            --jq '.[0].url // ""')"

          if git diff --quiet; then
            echo "No Flathub changes to propose."
            echo "url=${existing_pr_url}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config --local user.name "GitHub Actions"
          git config --local user.email "actions@github.com"
          git add \
            tech.dongdongbh.mindwtr.yml \
            tech.dongdongbh.mindwtr.node-sources.json \
            tech.dongdongbh.mindwtr.cargo-sources.json
          if [ -f .gitmodules ]; then
            git add .gitmodules
          fi
          if [ -e shared-modules ]; then
            git add shared-modules
          fi

          if git diff --cached --quiet; then
            echo "No staged Flathub changes to commit."
            echo "url=${existing_pr_url}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "Update ${{ inputs.channel }} to ${TAG}"
          if [ "${{ steps.branch.outputs.exists }}" = "true" ]; then
            git push origin "$BRANCH"
          else
            git push --set-upstream origin "$BRANCH"
          fi

          if [ -n "$existing_pr_url" ]; then
            echo "Updated existing PR: $existing_pr_url"
            echo "url=${existing_pr_url}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pr_body=$'Automated update from '"${GITHUB_REPOSITORY}"$' release '"${TAG}"$'.\n\n- Updates the pinned upstream commit\n- Regenerates tech.dongdongbh.mindwtr.cargo-sources.json\n- Regenerates tech.dongdongbh.mindwtr.node-sources.json'

          pr_url="$(gh pr create \
            --repo "$REPO" \
            --base "${{ steps.stability.outputs.flathub_branch }}" \
            --head "$BRANCH" \
            --title "Update ${{ inputs.channel }} to ${TAG}" \
            --body "$pr_body")"

          echo "url=${pr_url}" >> "$GITHUB_OUTPUT"

      - name: Write summary
        if: always()
        run: |
          echo "### Flathub Update" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: ${{ steps.version.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Channel: ${{ inputs.channel }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Flathub branch: ${{ steps.stability.outputs.flathub_branch }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.stability.outputs.skip }}" = "true" ]; then
            echo "- Skipped: ${{ steps.stability.outputs.message }}" >> "$GITHUB_STEP_SUMMARY"
          elif [ -n "${{ steps.pr.outputs.url }}" ]; then
            echo "- PR: ${{ steps.pr.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- PR: no changes were needed" >> "$GITHUB_STEP_SUMMARY"
          fi
