name: Android Internal Test Release

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Internal tester release notes"
        required: true
        default: "Diagnostic build with lightweight sync timing logs."
        type: string
      retention_days:
        description: "Artifact retention in days"
        required: true
        default: "14"
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_OPTIONS: --max-old-space-size=6144

concurrency:
  group: android-internal-test-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-internal-test:
    runs-on: ubuntu-latest
    name: Android Internal Test Release
    timeout-minutes: 90
    env:
      DROPBOX_APP_KEY: ${{ vars.DROPBOX_APP_KEY || secrets.DROPBOX_APP_KEY }}
      DONATION_PROMPT_ENABLED: "true"
      ANALYTICS_HEARTBEAT_CHANNEL: "android-internal-test"
      ANDROID_PROFILEABLE: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: bash scripts/ci/setup-android-sdk.sh

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: ".bun-version"

      - name: Cache Bun dependencies
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: |
          set -euo pipefail
          bun install || (
            echo "bun install failed, clearing cache and retrying..."
            (bun pm cache rm || bun pm cache clean)
            bun install
          )

      - name: Authenticate Google Play API
        id: play_auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.ANDROID_SERVICE_ACCOUNT_JSON }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/androidpublisher

      - name: Ensure Android versionCode is unique
        id: version_code
        env:
          ACCESS_TOKEN: ${{ steps.play_auth.outputs.access_token }}
        run: |
          set -euo pipefail
          PACKAGE="tech.dongdongbh.mindwtr"
          LOCAL_CODE=$(jq -r '.expo.android.versionCode // empty' apps/mobile/app.json)
          if [ -z "$LOCAL_CODE" ] || [ "$LOCAL_CODE" = "null" ]; then
            echo "Missing expo.android.versionCode in apps/mobile/app.json" >&2
            exit 1
          fi

          EDIT_FILE=$(mktemp)
          EDIT_CODE=$(curl -sS -o "$EDIT_FILE" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE/edits" \
            -d '{}')
          if [ "$EDIT_CODE" != "200" ]; then
            echo "Failed to create Google Play edit (HTTP $EDIT_CODE): $(cat "$EDIT_FILE")" >&2
            exit 1
          fi
          EDIT_ID=$(jq -r '.id' "$EDIT_FILE")
          if [ -z "$EDIT_ID" ] || [ "$EDIT_ID" = "null" ]; then
            echo "Failed to parse Google Play edit id: $(cat "$EDIT_FILE")" >&2
            exit 1
          fi

          TRACKS_FILE=$(mktemp)
          TRACKS_CODE=$(curl -sS -o "$TRACKS_FILE" -w "%{http_code}" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE/edits/$EDIT_ID/tracks")
          if [ "$TRACKS_CODE" != "200" ]; then
            echo "Failed to fetch Google Play tracks (HTTP $TRACKS_CODE): $(cat "$TRACKS_FILE")" >&2
            exit 1
          fi

          MAX_CODE=$(jq -r '[(.tracks // [])[]? | (.releases // [])[]? | (.versionCodes // [])[]? | tonumber] | max // 0' "$TRACKS_FILE")
          NEW_CODE="$LOCAL_CODE"
          if [ "$MAX_CODE" -ge "$LOCAL_CODE" ]; then
            NEW_CODE=$((MAX_CODE + 1))
            jq ".expo.android.versionCode = $NEW_CODE" apps/mobile/app.json > apps/mobile/app.json.tmp
            mv apps/mobile/app.json.tmp apps/mobile/app.json
            echo "Bumped versionCode to $NEW_CODE (store max was $MAX_CODE)"
          else
            echo "versionCode ok: local $LOCAL_CODE > store max $MAX_CODE"
          fi

          echo "version_code=$NEW_CODE" >> "$GITHUB_OUTPUT"

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Build Android AAB
        timeout-minutes: 60
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ANALYTICS_HEARTBEAT_URL: ${{ secrets.ANALYTICS_HEARTBEAT_URL }}
        run: |
          set -euo pipefail
          VERSION=$(jq -r '.expo.version' apps/mobile/app.json)
          cd apps/mobile
          mkdir -p build
          MINDWTR_ANDROID_ARCHS=arm64-v8a,armeabi-v7a eas build --platform android --profile production --local --non-interactive --output "./build/mindwtr-${VERSION}-internal-${GITHUB_RUN_NUMBER}.aab"
          ls -la ./build

      - name: Publish to Google Play internal track
        id: publish
        env:
          ACCESS_TOKEN: ${{ steps.play_auth.outputs.access_token }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          set -euo pipefail
          PACKAGE="tech.dongdongbh.mindwtr"
          VERSION=$(jq -r '.expo.version' apps/mobile/app.json)
          AAB_PATH=$(find apps/mobile/build -maxdepth 1 -name '*.aab' -print -quit)
          if [ -z "$AAB_PATH" ] || [ ! -f "$AAB_PATH" ]; then
            echo "Missing AAB artifact in apps/mobile/build" >&2
            exit 1
          fi

          EDIT_FILE=$(mktemp)
          EDIT_CODE=$(curl -sS -o "$EDIT_FILE" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE/edits" \
            -d '{}')
          if [ "$EDIT_CODE" != "200" ]; then
            echo "Failed to create Google Play edit (HTTP $EDIT_CODE): $(cat "$EDIT_FILE")" >&2
            exit 1
          fi
          EDIT_ID=$(jq -r '.id' "$EDIT_FILE")
          if [ -z "$EDIT_ID" ] || [ "$EDIT_ID" = "null" ]; then
            echo "Failed to parse Google Play edit id: $(cat "$EDIT_FILE")" >&2
            exit 1
          fi

          UPLOAD_FILE=$(mktemp)
          UPLOAD_CODE=$(curl -sS -o "$UPLOAD_FILE" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$AAB_PATH" \
            "https://androidpublisher.googleapis.com/upload/androidpublisher/v3/applications/$PACKAGE/edits/$EDIT_ID/bundles?uploadType=media")
          if [ "$UPLOAD_CODE" != "200" ]; then
            echo "Failed to upload AAB (HTTP $UPLOAD_CODE): $(cat "$UPLOAD_FILE")" >&2
            exit 1
          fi
          VERSION_CODE=$(jq -r '.versionCode' "$UPLOAD_FILE")
          if [ -z "$VERSION_CODE" ] || [ "$VERSION_CODE" = "null" ]; then
            echo "Failed to parse uploaded versionCode: $(cat "$UPLOAD_FILE")" >&2
            exit 1
          fi

          PAYLOAD_FILE=$(mktemp)
          jq -n \
            --arg version "$VERSION" \
            --arg run_number "$GITHUB_RUN_NUMBER" \
            --arg version_code "$VERSION_CODE" \
            --arg release_notes "$RELEASE_NOTES" \
            '{
              track: "internal",
              releases: [{
                name: ($version + " internal diagnostic " + $run_number),
                status: "completed",
                versionCodes: [$version_code],
                releaseNotes: [{
                  language: "en-US",
                  text: $release_notes
                }]
              }]
            }' > "$PAYLOAD_FILE"

          TRACK_FILE=$(mktemp)
          TRACK_CODE=$(curl -sS -o "$TRACK_FILE" -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE/edits/$EDIT_ID/tracks/internal" \
            -d @"$PAYLOAD_FILE")
          if [ "$TRACK_CODE" != "200" ]; then
            echo "Failed to update internal track (HTTP $TRACK_CODE): $(cat "$TRACK_FILE")" >&2
            exit 1
          fi

          COMMIT_FILE=$(mktemp)
          COMMIT_CODE=$(curl -sS -o "$COMMIT_FILE" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE/edits/$EDIT_ID:commit")
          if [ "$COMMIT_CODE" != "200" ]; then
            echo "Failed to commit Google Play edit (HTTP $COMMIT_CODE): $(cat "$COMMIT_FILE")" >&2
            exit 1
          fi

          echo "Published versionCode $VERSION_CODE to Google Play internal track."
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Collect internal test artifacts
        run: |
          set -euo pipefail
          mkdir -p android-internal-test-artifacts
          cp apps/mobile/build/*.aab android-internal-test-artifacts/
          {
            echo "Mindwtr Android internal test release"
            echo "Commit: ${GITHUB_SHA}"
            echo "VersionCode: ${{ steps.publish.outputs.version_code }}"
            echo "Track: internal"
            echo "Profileable: true"
          } > android-internal-test-artifacts/README.txt
          ls -la android-internal-test-artifacts

      - name: Upload Android internal test artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: android-internal-test-release
          path: android-internal-test-artifacts/*
          if-no-files-found: error
          retention-days: ${{ inputs.retention_days }}
