name: Release Android

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.2.3)'
        required: false
        type: string
      play_track:
        description: 'Google Play track(s) to publish. Use production for stable, internal,beta for RCs, or none to skip Play upload. Comma-separated testing tracks are supported.'
        required: false
        default: 'production'
        type: string
      internal_test_release:
        description: 'Publish a profileable build to the Google Play internal track'
        required: false
        default: false
        type: boolean
      release_notes:
        description: 'Testing-track release notes'
        required: false
        default: 'Diagnostic build with lightweight sync timing logs.'
        type: string
      retention_days:
        description: 'Internal artifact retention in days'
        required: false
        default: '14'
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.2.3)'
        required: false
        type: string
      play_track:
        description: 'Google Play track(s) to publish. Use production for stable, internal,beta for RCs, or none to skip Play upload. Comma-separated testing tracks are supported.'
        required: false
        default: 'production'
        type: string
      internal_test_release:
        description: 'Publish a profileable build to the Google Play internal track'
        required: true
        default: false
        type: boolean
      release_notes:
        description: 'Testing-track release notes'
        required: false
        default: 'Diagnostic build with lightweight sync timing logs.'
        type: string
      retention_days:
        description: 'Internal artifact retention in days'
        required: false
        default: '14'
        type: string

permissions:
  actions: read
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    name: Android Release Preflight
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.version_code.outputs.resolved_code || steps.version_code.outputs.local_code }}
      local_version_code: ${{ steps.version_code.outputs.local_code }}
      remote_max_version_code: ${{ steps.version_code.outputs.remote_max_code }}

    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Authenticate Google Play API
        if: ${{ inputs.play_track != 'none' || inputs.internal_test_release }}
        id: play_auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.ANDROID_SERVICE_ACCOUNT_JSON }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/androidpublisher

      - name: Resolve version
        id: version
        run: |
          INPUT_TAG="${{ inputs.tag || github.event.inputs.tag }}"
          GITHUB_EVENT_INPUTS_TAG="${{ github.event.inputs.tag }}"
          scripts/ci/resolve-release-version.sh "$INPUT_TAG" >> "$GITHUB_OUTPUT"

      - name: Ensure Android versionCode is unique
        if: ${{ inputs.play_track != 'none' || inputs.internal_test_release }}
        id: version_code
        env:
          ACCESS_TOKEN: ${{ steps.play_auth.outputs.access_token }}
        run: |
          set -euo pipefail
          PACKAGE="tech.dongdongbh.mindwtr"
          EDIT_ID=$(curl -sS -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE/edits" \
            -d '{}' | jq -r '.id')
          if [ -z "$EDIT_ID" ] || [ "$EDIT_ID" = "null" ]; then
            echo "Failed to create Google Play edit" >&2
            exit 1
          fi
          TRACKS_FILE=$(mktemp)
          TRACKS_CODE=$(curl -sS -o "$TRACKS_FILE" -w "%{http_code}" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE/edits/$EDIT_ID/tracks")
          TRACKS_JSON=$(cat "$TRACKS_FILE")
          if [ "$TRACKS_CODE" != "200" ]; then
            echo "Failed to fetch Google Play tracks (HTTP $TRACKS_CODE): $TRACKS_JSON" >&2
            exit 1
          fi
          if echo "$TRACKS_JSON" | jq -e '.error' >/dev/null; then
            echo "Failed to fetch Google Play tracks: $TRACKS_JSON" >&2
            exit 1
          fi
          MAX_CODE=$(echo "$TRACKS_JSON" | jq -r '[(.tracks // [])[]? | (.releases // [])[]? | (.versionCodes // [])[]? | tonumber] | max // 0')
          if [ -z "$MAX_CODE" ] || [ "$MAX_CODE" = "null" ]; then
            MAX_CODE=0
          fi
          curl -sS -X DELETE \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE/edits/$EDIT_ID" >/dev/null
          LOCAL_CODE=$(jq -r '.expo.android.versionCode' apps/mobile/app.json)
          if [ -z "$LOCAL_CODE" ] || [ "$LOCAL_CODE" = "null" ]; then
            echo "Missing expo.android.versionCode in apps/mobile/app.json" >&2
            exit 1
          fi
          RESOLVED_CODE="$LOCAL_CODE"
          if [ "$MAX_CODE" -ge "$LOCAL_CODE" ]; then
            RESOLVED_CODE=$((MAX_CODE + 1))
            echo "::warning::Google Play already has versionCode $MAX_CODE; local versionCode $LOCAL_CODE will be bumped to $RESOLVED_CODE for this CI build."
          else
            echo "versionCode ok: local $LOCAL_CODE > store $MAX_CODE"
          fi
          echo "local_code=$LOCAL_CODE" >> "$GITHUB_OUTPUT"
          echo "remote_max_code=$MAX_CODE" >> "$GITHUB_OUTPUT"
          echo "resolved_code=$RESOLVED_CODE" >> "$GITHUB_OUTPUT"

  build-aab:
    needs: preflight
    runs-on: ubuntu-latest
    name: Android AAB Build
    timeout-minutes: 75
    env:
      DROPBOX_APP_KEY: ${{ vars.DROPBOX_APP_KEY || secrets.DROPBOX_APP_KEY }}
      DONATION_PROMPT_ENABLED: "true"
      IS_INTERNAL_TEST_RELEASE: ${{ inputs.internal_test_release && 'true' || 'false' }}
      ANDROID_PROFILEABLE: ${{ inputs.internal_test_release && 'true' || 'false' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: bash scripts/ci/setup-android-sdk.sh

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: bun install

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Apply resolved Android versionCode
        if: ${{ needs.preflight.outputs.version_code != '' }}
        env:
          VERSION_CODE: ${{ needs.preflight.outputs.version_code }}
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('fs');
          const path = 'apps/mobile/app.json';
          const versionCode = Number(process.env.VERSION_CODE);
          if (!Number.isInteger(versionCode) || versionCode <= 0) {
            throw new Error(`Invalid Android versionCode: ${process.env.VERSION_CODE}`);
          }
          const json = JSON.parse(fs.readFileSync(path, 'utf8'));
          json.expo = json.expo || {};
          json.expo.android = json.expo.android || {};
          const previous = json.expo.android.versionCode;
          json.expo.android.versionCode = versionCode;
          fs.writeFileSync(path, `${JSON.stringify(json, null, 2)}\n`);
          console.log(`Android versionCode: ${previous} -> ${versionCode}`);
          NODE

      - name: Build Android AAB (local EAS)
        timeout-minutes: 60
        run: |
          set -euo pipefail
          VERSION=${{ needs.preflight.outputs.version }}
          cd apps/mobile
          OUTPUT="./build/mindwtr-${VERSION}.aab"
          if [ "${IS_INTERNAL_TEST_RELEASE}" = "true" ]; then
            OUTPUT="./build/mindwtr-${VERSION}-internal-${GITHUB_RUN_NUMBER}.aab"
          fi
          MINDWTR_ANDROID_ARCHS=arm64-v8a,armeabi-v7a eas build --platform android --profile production --local --non-interactive --output "$OUTPUT"
          ls -la ./build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ANALYTICS_HEARTBEAT_URL: ${{ secrets.ANALYTICS_HEARTBEAT_URL }}
          ANALYTICS_HEARTBEAT_CHANNEL: ${{ inputs.internal_test_release && 'android-internal-test' || '' }}
          ANALYTICS_RELEASE_VERSION: ${{ inputs.tag || github.event.inputs.tag || github.ref_name }}
          FEEDBACK_ENDPOINT_URL: ${{ vars.FEEDBACK_ENDPOINT_URL || vars.VITE_FEEDBACK_ENDPOINT_URL || 'https://mindwtr-feedback.mindwtr.workers.dev' }}

      - name: Upload Android AAB build artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: android-aab-build
          path: apps/mobile/build/*.aab
          if-no-files-found: error
          retention-days: ${{ inputs.retention_days }}

  build-apk:
    if: ${{ !inputs.internal_test_release }}
    needs: preflight
    runs-on: ubuntu-latest
    name: Android APK Build
    timeout-minutes: 75
    env:
      DROPBOX_APP_KEY: ${{ vars.DROPBOX_APP_KEY || secrets.DROPBOX_APP_KEY }}
      DONATION_PROMPT_ENABLED: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: bash scripts/ci/setup-android-sdk.sh

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: bun install

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Apply resolved Android versionCode
        if: ${{ needs.preflight.outputs.version_code != '' }}
        env:
          VERSION_CODE: ${{ needs.preflight.outputs.version_code }}
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('fs');
          const path = 'apps/mobile/app.json';
          const versionCode = Number(process.env.VERSION_CODE);
          if (!Number.isInteger(versionCode) || versionCode <= 0) {
            throw new Error(`Invalid Android versionCode: ${process.env.VERSION_CODE}`);
          }
          const json = JSON.parse(fs.readFileSync(path, 'utf8'));
          json.expo = json.expo || {};
          json.expo.android = json.expo.android || {};
          const previous = json.expo.android.versionCode;
          json.expo.android.versionCode = versionCode;
          fs.writeFileSync(path, `${JSON.stringify(json, null, 2)}\n`);
          console.log(`Android versionCode: ${previous} -> ${versionCode}`);
          NODE

      - name: Build Android APK (local EAS)
        timeout-minutes: 60
        run: |
          set -euo pipefail
          VERSION=${{ needs.preflight.outputs.version }}
          cd apps/mobile
          MINDWTR_ANDROID_ARCHS=arm64-v8a,armeabi-v7a eas build --platform android --profile production-apk --local --non-interactive --output ./build/mindwtr-${VERSION}.apk
          ls -la ./build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ANALYTICS_HEARTBEAT_URL: ${{ secrets.ANALYTICS_HEARTBEAT_URL }}
          ANALYTICS_RELEASE_VERSION: ${{ inputs.tag || github.event.inputs.tag || github.ref_name }}
          FEEDBACK_ENDPOINT_URL: ${{ vars.FEEDBACK_ENDPOINT_URL || vars.VITE_FEEDBACK_ENDPOINT_URL || 'https://mindwtr-feedback.mindwtr.workers.dev' }}

      - name: Collect Android release artifacts
        run: |
          set -euo pipefail
          VERSION=${{ needs.preflight.outputs.version }}
          APK_PATH="apps/mobile/build/mindwtr-${VERSION}.apk"
          if [ ! -f "${APK_PATH}" ]; then
            echo "Missing APK artifact: ${APK_PATH}" >&2
            exit 1
          fi
          mkdir -p release-artifacts
          cp "${APK_PATH}" "release-artifacts/mindwtr-${VERSION}.apk"
          ls -la release-artifacts

      - name: Upload Android release artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: release-android
          path: release-artifacts/*
          if-no-files-found: error
          retention-days: 28

  publish:
    if: ${{ always() && inputs.play_track != 'none' && needs.preflight.result == 'success' && needs.build-aab.result == 'success' && ((needs.build-apk.result == 'success' && (inputs.play_track != 'production' || (startsWith(github.ref, 'refs/tags/') && github.event_name != 'workflow_dispatch' && !contains(github.ref_name, '-')))) || inputs.internal_test_release) }}
    needs: [preflight, build-aab, build-apk]
    runs-on: ubuntu-latest
    name: Android Publish
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Authenticate Google Play API
        id: play_auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.ANDROID_SERVICE_ACCOUNT_JSON }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/androidpublisher

      - name: Download Android AAB artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          download_dir="$(mktemp -d)"
          mkdir -p apps/mobile/build
          gh run download "$GITHUB_RUN_ID" -n android-aab-build -D "$download_dir"
          find "$download_dir" -type f -name '*.aab' -print -exec cp {} apps/mobile/build/ \;
          if ! find apps/mobile/build -maxdepth 1 -name '*.aab' -print -quit | grep -q .; then
            echo "Downloaded android-aab-build artifact did not contain an AAB." >&2
            exit 1
          fi
          ls -la apps/mobile/build

      - name: Prepare Google Play release notes
        if: ${{ !inputs.internal_test_release && inputs.play_track == 'production' }}
        run: |
          set -euo pipefail
          VERSION=${{ needs.preflight.outputs.version }}
          NOTES_FILE="docs/release-notes/google-play/${VERSION}.txt"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "Missing release notes file: $NOTES_FILE" >&2
            exit 1
          fi
          OUT_DIR="apps/mobile/build/play-release-notes"
          rm -rf "$OUT_DIR"
          mkdir -p "$OUT_DIR"
          awk -v out="$OUT_DIR" '
            /^<[^>]+>$/ {
              tag=$0
              gsub(/[<>]/, "", tag)
              file=out "/whatsnew-" tag
              next
            }
            /^<\/[^>]+>$/ {
              tag=""
              next
            }
            tag != "" { print >> file }
          ' "$NOTES_FILE"
          python3 - "$OUT_DIR" "$NOTES_FILE" <<'PY'
          import pathlib
          import sys

          notes_dir = pathlib.Path(sys.argv[1])
          notes_file = sys.argv[2]
          limit = 500
          required_locales = {"en-US", "de-DE", "es-ES", "fr-FR", "zh-CN"}
          violations = []
          found_locales = set()

          for path in sorted(notes_dir.glob("whatsnew-*")):
              locale = path.name.replace("whatsnew-", "", 1)
              found_locales.add(locale)
              text = path.read_text(encoding="utf-8").strip()
              length = len(text)
              print(f"{path.name}: {length}/{limit}")
              if length > limit:
                  violations.append((locale, length))

          missing = sorted(required_locales - found_locales)
          if missing:
              raise SystemExit(
                  f"Google Play release notes missing required locales: {', '.join(missing)}. "
                  f"Update {notes_file} before publishing."
              )

          if violations:
              formatted = ", ".join(f"{locale}={length}" for locale, length in violations)
              raise SystemExit(
                  f"Google Play release notes exceed {limit} characters: {formatted}. "
                  f"Shorten {notes_file} before publishing."
              )
          PY
          ls -la "$OUT_DIR"

      - name: Prepare Google Play listing assets
        if: ${{ !inputs.internal_test_release && inputs.play_track == 'production' }}
        run: |
          set -euo pipefail
          python3 scripts/ci/prepare-google-play-listing-assets.py \
            apps/mobile/screenshots/android/playstore \
            apps/mobile/build/play-listing-assets.json
          cat apps/mobile/build/play-listing-assets.json

      - name: Prepare Google Play listing metadata
        if: ${{ !inputs.internal_test_release && inputs.play_track == 'production' }}
        run: |
          set -euo pipefail
          python3 scripts/ci/prepare-google-play-listing-metadata.py \
            metadata \
            apps/mobile/build/play-listing-metadata.json
          cat apps/mobile/build/play-listing-metadata.json

      - name: Publish to Google Play Store (Production)
        if: inputs.play_track == 'production' && startsWith(github.ref, 'refs/tags/') && github.event_name != 'workflow_dispatch' && !contains(github.ref_name, '-')
        env:
          ACCESS_TOKEN: ${{ steps.play_auth.outputs.access_token }}
        run: |
          set -euo pipefail
          PACKAGE="tech.dongdongbh.mindwtr"
          VERSION="${{ needs.preflight.outputs.version }}"
          AAB_PATH="apps/mobile/build/mindwtr-${VERSION}.aab"
          NOTES_DIR="apps/mobile/build/play-release-notes"
          LISTING_ASSETS_FILE="apps/mobile/build/play-listing-assets.json"
          LISTING_METADATA_FILE="apps/mobile/build/play-listing-metadata.json"

          if [ ! -f "$AAB_PATH" ]; then
            echo "Missing AAB artifact: $AAB_PATH" >&2
            exit 1
          fi

          EDIT_FILE=$(mktemp)
          EDIT_CODE=$(curl -sS -o "$EDIT_FILE" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE/edits" \
            -d '{}')
          if [ "$EDIT_CODE" != "200" ]; then
            echo "Failed to create Google Play edit (HTTP $EDIT_CODE): $(cat "$EDIT_FILE")" >&2
            exit 1
          fi
          EDIT_ID=$(jq -r '.id' "$EDIT_FILE")
          if [ -z "$EDIT_ID" ] || [ "$EDIT_ID" = "null" ]; then
            echo "Failed to parse Google Play edit id: $(cat "$EDIT_FILE")" >&2
            exit 1
          fi

          UPLOAD_FILE=$(mktemp)
          UPLOAD_CODE=$(curl -sS -o "$UPLOAD_FILE" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$AAB_PATH" \
            "https://androidpublisher.googleapis.com/upload/androidpublisher/v3/applications/$PACKAGE/edits/$EDIT_ID/bundles?uploadType=media")
          if [ "$UPLOAD_CODE" != "200" ]; then
            echo "Failed to upload AAB to Google Play (HTTP $UPLOAD_CODE): $(cat "$UPLOAD_FILE")" >&2
            exit 1
          fi
          VERSION_CODE=$(jq -r '.versionCode' "$UPLOAD_FILE")
          if [ -z "$VERSION_CODE" ] || [ "$VERSION_CODE" = "null" ]; then
            echo "Failed to parse uploaded versionCode: $(cat "$UPLOAD_FILE")" >&2
            exit 1
          fi

          if [ -f "$LISTING_ASSETS_FILE" ] && [ "$(jq 'length' "$LISTING_ASSETS_FILE")" -gt 0 ]; then
            declare -A RESET_GROUPS=()
            while IFS=$'\t' read -r LANGUAGE IMAGE_TYPE ASSET_PATH; do
              if [ -z "$LANGUAGE" ] || [ -z "$IMAGE_TYPE" ] || [ -z "$ASSET_PATH" ]; then
                continue
              fi
              if [ ! -f "$ASSET_PATH" ]; then
                echo "Missing Google Play listing asset: $ASSET_PATH" >&2
                exit 1
              fi

              GROUP_KEY="${LANGUAGE}/${IMAGE_TYPE}"
              if [ -z "${RESET_GROUPS[$GROUP_KEY]:-}" ]; then
                DELETE_FILE=$(mktemp)
                DELETE_CODE=$(curl -sS -o "$DELETE_FILE" -w "%{http_code}" -X DELETE \
                  -H "Authorization: Bearer $ACCESS_TOKEN" \
                  "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE/edits/$EDIT_ID/listings/$LANGUAGE/$IMAGE_TYPE")
                if [ "$DELETE_CODE" != "200" ]; then
                  echo "Failed to clear Google Play listing assets for $GROUP_KEY (HTTP $DELETE_CODE): $(cat "$DELETE_FILE")" >&2
                  exit 1
                fi
                RESET_GROUPS[$GROUP_KEY]=1
              fi

              case "${ASSET_PATH##*.}" in
                png|PNG) CONTENT_TYPE="image/png" ;;
                jpg|JPG|jpeg|JPEG) CONTENT_TYPE="image/jpeg" ;;
                *)
                  echo "Unsupported Google Play listing asset type: $ASSET_PATH" >&2
                  exit 1
                  ;;
              esac

              IMAGE_FILE=$(mktemp)
              IMAGE_CODE=$(curl -sS -o "$IMAGE_FILE" -w "%{http_code}" -X POST \
                -H "Authorization: Bearer $ACCESS_TOKEN" \
                -H "Content-Type: $CONTENT_TYPE" \
                --data-binary @"$ASSET_PATH" \
                "https://androidpublisher.googleapis.com/upload/androidpublisher/v3/applications/$PACKAGE/edits/$EDIT_ID/listings/$LANGUAGE/$IMAGE_TYPE?uploadType=media")
              if [ "$IMAGE_CODE" != "200" ]; then
                echo "Failed to upload Google Play listing asset $ASSET_PATH for $GROUP_KEY (HTTP $IMAGE_CODE): $(cat "$IMAGE_FILE")" >&2
                exit 1
              fi
              echo "Uploaded Google Play listing asset $ASSET_PATH -> $GROUP_KEY"
            done < <(jq -r '.[] | [.language, .imageType, .path] | @tsv' "$LISTING_ASSETS_FILE")
          else
            echo "No Google Play listing assets found; skipping listing image upload."
          fi

          if [ -f "$LISTING_METADATA_FILE" ] && [ "$(jq 'length' "$LISTING_METADATA_FILE")" -gt 0 ]; then
            while IFS= read -r LISTING_JSON; do
              LISTING_PAYLOAD_FILE=$(mktemp)
              printf '%s\n' "$LISTING_JSON" > "$LISTING_PAYLOAD_FILE"
              LANGUAGE=$(jq -r '.language' "$LISTING_PAYLOAD_FILE")
              if [ -z "$LANGUAGE" ] || [ "$LANGUAGE" = "null" ]; then
                echo "Missing Google Play listing language in $LISTING_METADATA_FILE" >&2
                exit 1
              fi

              LISTING_FILE=$(mktemp)
              LISTING_CODE=$(curl -sS -o "$LISTING_FILE" -w "%{http_code}" -X PUT \
                -H "Authorization: Bearer $ACCESS_TOKEN" \
                -H "Content-Type: application/json" \
                "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE/edits/$EDIT_ID/listings/$LANGUAGE" \
                -d @"$LISTING_PAYLOAD_FILE")
              if [ "$LISTING_CODE" != "200" ]; then
                echo "Failed to update Google Play listing metadata for $LANGUAGE (HTTP $LISTING_CODE): $(cat "$LISTING_FILE")" >&2
                exit 1
              fi
              echo "Updated Google Play listing metadata for $LANGUAGE"
            done < <(jq -c '.[]' "$LISTING_METADATA_FILE")
          else
            echo "No Google Play listing metadata found; skipping listing metadata upload."
          fi

          PAYLOAD_FILE=$(mktemp)
          python3 - "$VERSION" "$VERSION_CODE" "$NOTES_DIR" > "$PAYLOAD_FILE" <<'PY'
          import json
          import pathlib
          import sys

          version = sys.argv[1]
          version_code = sys.argv[2]
          notes_dir = pathlib.Path(sys.argv[3])

          release = {
              "name": version,
              "status": "completed",
              "versionCodes": [version_code],
          }

          release_notes = []
          if notes_dir.is_dir():
              for path in sorted(notes_dir.glob("whatsnew-*")):
                  text = path.read_text(encoding="utf-8").strip()
                  if not text:
                      continue
                  release_notes.append({
                      "language": path.name.replace("whatsnew-", "", 1),
                      "text": text,
                  })
          if release_notes:
              release["releaseNotes"] = release_notes

          print(json.dumps({
              "track": "production",
              "releases": [release],
          }))
          PY

          TRACK_FILE=$(mktemp)
          TRACK_CODE=$(curl -sS -o "$TRACK_FILE" -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE/edits/$EDIT_ID/tracks/production" \
            -d @"$PAYLOAD_FILE")
          if [ "$TRACK_CODE" != "200" ]; then
            echo "Failed to update production track (HTTP $TRACK_CODE): $(cat "$TRACK_FILE")" >&2
            exit 1
          fi

          COMMIT_FILE=$(mktemp)
          COMMIT_CODE=$(curl -sS -o "$COMMIT_FILE" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE/edits/$EDIT_ID:commit")
          if [ "$COMMIT_CODE" != "200" ]; then
            echo "Failed to commit production-track edit (HTTP $COMMIT_CODE): $(cat "$COMMIT_FILE")" >&2
            exit 1
          fi
          echo "Published versionCode $VERSION_CODE to Google Play production."

      - name: Publish to Google Play testing tracks
        if: ${{ !inputs.internal_test_release && inputs.play_track != 'production' && inputs.play_track != 'none' }}
        env:
          ACCESS_TOKEN: ${{ steps.play_auth.outputs.access_token }}
          PLAY_TRACKS: ${{ inputs.play_track }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          set -euo pipefail
          PACKAGE="tech.dongdongbh.mindwtr"
          VERSION="${{ needs.preflight.outputs.version }}"
          AAB_PATH="apps/mobile/build/mindwtr-${VERSION}.aab"

          IFS=',' read -r -a RAW_TRACKS <<< "$PLAY_TRACKS"
          TRACKS=()
          for raw_track in "${RAW_TRACKS[@]}"; do
            track="${raw_track//[[:space:]]/}"
            if [ -z "$track" ]; then
              continue
            fi
            if [ "$track" = "production" ] || [ "$track" = "none" ]; then
              echo "Production and none are not valid testing-track entries: $track" >&2
              exit 1
            fi
            if [[ ! "$track" =~ ^[A-Za-z0-9._-]+$ ]]; then
              echo "Invalid Google Play track name: $track" >&2
              exit 1
            fi

            duplicate=false
            for existing in "${TRACKS[@]}"; do
              if [ "$existing" = "$track" ]; then
                duplicate=true
                break
              fi
            done
            if [ "$duplicate" = "false" ]; then
              TRACKS+=("$track")
            fi
          done

          if [ "${#TRACKS[@]}" -eq 0 ]; then
            echo "No Google Play testing tracks were configured." >&2
            exit 1
          fi
          if [ ! -f "$AAB_PATH" ]; then
            echo "Missing AAB artifact: $AAB_PATH" >&2
            exit 1
          fi

          EDIT_FILE=$(mktemp)
          EDIT_CODE=$(curl -sS -o "$EDIT_FILE" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE/edits" \
            -d '{}')
          if [ "$EDIT_CODE" != "200" ]; then
            echo "Failed to create Google Play edit (HTTP $EDIT_CODE): $(cat "$EDIT_FILE")" >&2
            exit 1
          fi
          EDIT_ID=$(jq -r '.id' "$EDIT_FILE")
          if [ -z "$EDIT_ID" ] || [ "$EDIT_ID" = "null" ]; then
            echo "Failed to parse Google Play edit id: $(cat "$EDIT_FILE")" >&2
            exit 1
          fi

          UPLOAD_FILE=$(mktemp)
          UPLOAD_CODE=$(curl -sS -o "$UPLOAD_FILE" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$AAB_PATH" \
            "https://androidpublisher.googleapis.com/upload/androidpublisher/v3/applications/$PACKAGE/edits/$EDIT_ID/bundles?uploadType=media")
          if [ "$UPLOAD_CODE" != "200" ]; then
            echo "Failed to upload AAB to Google Play (HTTP $UPLOAD_CODE): $(cat "$UPLOAD_FILE")" >&2
            exit 1
          fi
          VERSION_CODE=$(jq -r '.versionCode' "$UPLOAD_FILE")
          if [ -z "$VERSION_CODE" ] || [ "$VERSION_CODE" = "null" ]; then
            echo "Failed to parse uploaded versionCode: $(cat "$UPLOAD_FILE")" >&2
            exit 1
          fi

          for TRACK in "${TRACKS[@]}"; do
            PAYLOAD_FILE=$(mktemp)
            jq -n \
              --arg track "$TRACK" \
              --arg version "$VERSION" \
              --arg version_code "$VERSION_CODE" \
              --arg release_notes "$RELEASE_NOTES" \
              '{
                track: $track,
                releases: [{
                  name: ($version + " release candidate"),
                  status: "completed",
                  versionCodes: [$version_code],
                  releaseNotes: [{
                    language: "en-US",
                    text: $release_notes
                  }]
                }]
              }' > "$PAYLOAD_FILE"

            TRACK_FILE=$(mktemp)
            TRACK_CODE=$(curl -sS -o "$TRACK_FILE" -w "%{http_code}" -X PUT \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE/edits/$EDIT_ID/tracks/$TRACK" \
              -d @"$PAYLOAD_FILE")
            if [ "$TRACK_CODE" != "200" ]; then
              echo "Failed to update Google Play $TRACK track (HTTP $TRACK_CODE): $(cat "$TRACK_FILE")" >&2
              exit 1
            fi
          done

          COMMIT_FILE=$(mktemp)
          COMMIT_CODE=$(curl -sS -o "$COMMIT_FILE" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE/edits/$EDIT_ID:commit")
          if [ "$COMMIT_CODE" != "200" ]; then
            echo "Failed to commit Google Play testing-track edit (HTTP $COMMIT_CODE): $(cat "$COMMIT_FILE")" >&2
            exit 1
          fi
          TRACK_LIST="$(IFS=,; echo "${TRACKS[*]}")"
          echo "Published versionCode $VERSION_CODE to Google Play testing tracks: $TRACK_LIST."

      - name: Publish to Google Play Store (Internal test)
        if: ${{ inputs.internal_test_release }}
        id: internal_publish
        env:
          ACCESS_TOKEN: ${{ steps.play_auth.outputs.access_token }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          set -euo pipefail
          PACKAGE="tech.dongdongbh.mindwtr"
          VERSION="${{ needs.preflight.outputs.version }}"
          AAB_PATH=$(find apps/mobile/build -maxdepth 1 -name '*.aab' -print -quit)
          if [ -z "$AAB_PATH" ] || [ ! -f "$AAB_PATH" ]; then
            echo "Missing AAB artifact in apps/mobile/build" >&2
            exit 1
          fi

          EDIT_FILE=$(mktemp)
          EDIT_CODE=$(curl -sS -o "$EDIT_FILE" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE/edits" \
            -d '{}')
          if [ "$EDIT_CODE" != "200" ]; then
            echo "Failed to create Google Play edit (HTTP $EDIT_CODE): $(cat "$EDIT_FILE")" >&2
            exit 1
          fi
          EDIT_ID=$(jq -r '.id' "$EDIT_FILE")
          if [ -z "$EDIT_ID" ] || [ "$EDIT_ID" = "null" ]; then
            echo "Failed to parse Google Play edit id: $(cat "$EDIT_FILE")" >&2
            exit 1
          fi

          UPLOAD_FILE=$(mktemp)
          UPLOAD_CODE=$(curl -sS -o "$UPLOAD_FILE" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$AAB_PATH" \
            "https://androidpublisher.googleapis.com/upload/androidpublisher/v3/applications/$PACKAGE/edits/$EDIT_ID/bundles?uploadType=media")
          if [ "$UPLOAD_CODE" != "200" ]; then
            echo "Failed to upload AAB (HTTP $UPLOAD_CODE): $(cat "$UPLOAD_FILE")" >&2
            exit 1
          fi
          VERSION_CODE=$(jq -r '.versionCode' "$UPLOAD_FILE")
          if [ -z "$VERSION_CODE" ] || [ "$VERSION_CODE" = "null" ]; then
            echo "Failed to parse uploaded versionCode: $(cat "$UPLOAD_FILE")" >&2
            exit 1
          fi

          PAYLOAD_FILE=$(mktemp)
          jq -n \
            --arg version "$VERSION" \
            --arg run_number "$GITHUB_RUN_NUMBER" \
            --arg version_code "$VERSION_CODE" \
            --arg release_notes "$RELEASE_NOTES" \
            '{
              track: "internal",
              releases: [{
                name: ($version + " internal diagnostic " + $run_number),
                status: "completed",
                versionCodes: [$version_code],
                releaseNotes: [{
                  language: "en-US",
                  text: $release_notes
                }]
              }]
            }' > "$PAYLOAD_FILE"

          TRACK_FILE=$(mktemp)
          TRACK_CODE=$(curl -sS -o "$TRACK_FILE" -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE/edits/$EDIT_ID/tracks/internal" \
            -d @"$PAYLOAD_FILE")
          if [ "$TRACK_CODE" != "200" ]; then
            echo "Failed to update internal track (HTTP $TRACK_CODE): $(cat "$TRACK_FILE")" >&2
            exit 1
          fi

          COMMIT_FILE=$(mktemp)
          COMMIT_CODE=$(curl -sS -o "$COMMIT_FILE" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE/edits/$EDIT_ID:commit")
          if [ "$COMMIT_CODE" != "200" ]; then
            echo "Failed to commit Google Play edit (HTTP $COMMIT_CODE): $(cat "$COMMIT_FILE")" >&2
            exit 1
          fi

          echo "Published profileable versionCode $VERSION_CODE to Google Play internal track."
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Publish same versionCode to stable testing tracks (no re-upload)
        if: inputs.play_track == 'production' && startsWith(github.ref, 'refs/tags/') && github.event_name != 'workflow_dispatch' && !contains(github.ref_name, '-')
        env:
          ACCESS_TOKEN: ${{ steps.play_auth.outputs.access_token }}
          TESTING_TRACKS: internal,beta
        run: |
          set -euo pipefail
          PACKAGE="tech.dongdongbh.mindwtr"
          VERSION=${{ needs.preflight.outputs.version }}
          VERSION_CODE=${{ needs.preflight.outputs.version_code }}
          if [ -z "$VERSION_CODE" ] || [ "$VERSION_CODE" = "null" ]; then
            echo "Missing preflight Android versionCode output" >&2
            exit 1
          fi

          IFS=',' read -r -a RAW_TRACKS <<< "$TESTING_TRACKS"
          TRACKS=()
          for raw_track in "${RAW_TRACKS[@]}"; do
            track="${raw_track//[[:space:]]/}"
            [ -n "$track" ] || continue
            if [ "$track" = "production" ] || [ "$track" = "none" ]; then
              echo "Production and none are not valid stable testing-track entries: $track" >&2
              exit 1
            fi
            if [[ ! "$track" =~ ^[A-Za-z0-9._-]+$ ]]; then
              echo "Invalid Google Play track name: $track" >&2
              exit 1
            fi
            duplicate=false
            for existing in "${TRACKS[@]}"; do
              if [ "$existing" = "$track" ]; then
                duplicate=true
                break
              fi
            done
            if [ "$duplicate" = "false" ]; then
              TRACKS+=("$track")
            fi
          done
          if [ "${#TRACKS[@]}" -eq 0 ]; then
            echo "No stable testing tracks configured." >&2
            exit 1
          fi

          EDIT_FILE=$(mktemp)
          EDIT_CODE=$(curl -sS -o "$EDIT_FILE" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE/edits" \
            -d '{}')
          if [ "$EDIT_CODE" != "200" ]; then
            echo "Failed to create Google Play edit (HTTP $EDIT_CODE): $(cat "$EDIT_FILE")" >&2
            exit 1
          fi
          EDIT_ID=$(jq -r '.id' "$EDIT_FILE")
          if [ -z "$EDIT_ID" ] || [ "$EDIT_ID" = "null" ]; then
            echo "Failed to parse edit id: $(cat "$EDIT_FILE")" >&2
            exit 1
          fi

          for TRACK in "${TRACKS[@]}"; do
            PAYLOAD_FILE=$(mktemp)
            jq -n \
              --arg track "$TRACK" \
              --arg version "$VERSION" \
              --arg version_code "$VERSION_CODE" \
              '{
                track: $track,
                releases: [{
                  name: ($version + " stable " + $track),
                  status: "completed",
                  versionCodes: [$version_code]
                }]
              }' > "$PAYLOAD_FILE"

            TRACK_FILE=$(mktemp)
            TRACK_CODE=$(curl -sS -o "$TRACK_FILE" -w "%{http_code}" -X PUT \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE/edits/$EDIT_ID/tracks/$TRACK" \
              -d @"$PAYLOAD_FILE")
            if [ "$TRACK_CODE" != "200" ]; then
              echo "Failed to update $TRACK track (HTTP $TRACK_CODE): $(cat "$TRACK_FILE")" >&2
              exit 1
            fi
          done

          COMMIT_FILE=$(mktemp)
          COMMIT_CODE=$(curl -sS -o "$COMMIT_FILE" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE/edits/$EDIT_ID:commit")
          if [ "$COMMIT_CODE" != "200" ]; then
            echo "Failed to commit stable testing-track edit (HTTP $COMMIT_CODE): $(cat "$COMMIT_FILE")" >&2
            exit 1
          fi
          TRACK_LIST="$(IFS=,; echo "${TRACKS[*]}")"
          echo "Published stable versionCode $VERSION_CODE to Google Play testing tracks without uploading a second AAB: $TRACK_LIST."

      - name: Collect Android internal test artifacts
        if: ${{ inputs.internal_test_release }}
        run: |
          set -euo pipefail
          mkdir -p android-internal-test-artifacts
          cp apps/mobile/build/*.aab android-internal-test-artifacts/
          {
            echo "Mindwtr Android internal test release"
            echo "Commit: ${GITHUB_SHA}"
            echo "VersionCode: ${{ steps.internal_publish.outputs.version_code }}"
            echo "Track: internal"
            echo "Profileable: true"
          } > android-internal-test-artifacts/README.txt
          ls -la android-internal-test-artifacts

      - name: Upload Android internal test artifacts
        if: ${{ inputs.internal_test_release }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: android-internal-test-release
          path: android-internal-test-artifacts/*
          if-no-files-found: error
          retention-days: ${{ inputs.retention_days }}
